<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Auto Frequent Bookmarks — 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <h1>Auto Frequent Bookmarks 設定</h1>

  <section>
    <h2>來源資料夾</h2>
    <p>勾選要掃描的書籤資料夾，擴充套件將從這些資料夾中找出常用書籤。</p>
    <div id="folder-tree">載入中…</div>
  </section>

  <section>
    <h2>設定</h2>

    <label for="sort-mode">排序方式：</label>
    <select id="sort-mode">
      <option value="lastVisit">最近造訪時間</option>
      <option value="visitCount">總造訪次數</option>
    </select>

    <label for="max-results">最多顯示筆數：</label>
    <input type="number" id="max-results" min="1" max="100" value="20">

    <label for="max-age-days">只顯示最近有造訪：</label>
    <select id="max-age-days">
      <option value="0">不限制</option>
      <option value="30">最近 1 個月</option>
      <option value="90">最近 3 個月</option>
      <option value="180">最近 6 個月</option>
      <option value="365">最近 1 年</option>
    </select>

    <label for="output-name">輸出資料夾名稱：</label>
    <input type="text" id="output-name" value="🔥 常用書籤">

    <label class="checkbox-label">
      <input type="checkbox" id="refresh-on-startup" checked>
      瀏覽器啟動時自動重新整理
    </label>

    <label for="alarm-interval">定時自動更新：</label>
    <select id="alarm-interval">
      <option value="0">關閉</option>
      <option value="15">每 15 分鐘</option>
      <option value="30">每 30 分鐘</option>
      <option value="60">每 1 小時</option>
      <option value="180">每 3 小時</option>
      <option value="360">每 6 小時</option>
      <option value="720">每 12 小時</option>
      <option value="1440">每 24 小時</option>
    </select>
  </section>

  <section id="section-actions">
    <button id="btn-save">儲存設定</button>
    <button id="btn-refresh">立即重新整理</button>
    <p id="status-message" aria-live="polite"></p>
  </section>

  <script src="options.js"></script>
</body>
</html>
